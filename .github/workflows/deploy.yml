name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy when a newer commit arrives.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print Flutter version (debug)
        run: flutter --version

      - name: Ensure web platform is present
        # Idempotent: regenerates only the missing web/ folder; doesn't touch
        # lib/, pubspec.yaml, android/, or ios/. Needed because the repo was
        # bootstrapped with --platforms=android,ios so `web/` doesn't exist yet.
        run: flutter create --platforms=web --org com.example .

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        # --base-href MUST match the repo name (with leading and trailing
        # slashes) so Flutter's asset paths resolve under the project subpath.
        run: flutter build web --release --base-href "/pice_app_demo/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
